name: Flash English Test

on:
  push:
    branches:
      - main
      - develop
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      # リポジトリ取得
      - name: Checkout
        uses: actions/checkout@v4

      # Flutter セットアップ
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      # 依存関係取得
      - name: Install dependencies
        run: flutter pub get

      # フォーマットチェック（任意だけどおすすめ）
      - name: Check formatting
        run: dart format --output=none --set-exit-if-changed .

      # 静的解析
      #- name: Analyze
      #  run: flutter analyze

      # テスト実行（ここが本命）
      - name: Run tests
        run: flutter test
